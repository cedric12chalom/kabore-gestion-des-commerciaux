version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-change-in-production"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://localhost:3000"
      USE_REDIS: "True"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - redis
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 geocommerce_backend.asgi:application"

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: ng serve --host 0.0.0.0 --port 4200