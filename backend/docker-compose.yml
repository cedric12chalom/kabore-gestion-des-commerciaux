version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: geocommerce_db
    environment:
      POSTGRES_DB: geocommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: geocommerce_backend
    environment:
      DEBUG: 'True'
      SECRET_KEY: 'dev-secret-key-docker'
      DB_NAME: geocommerce
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: 'http://localhost:4200,http://127.0.0.1:4200'
    volumes:
      - .:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  redis:
    image: redis:7-alpine
    container_name: geocommerce_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  media_files:
